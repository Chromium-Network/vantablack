      --transition:cubic-bezier(0.23,1,0.32,1);
    }
    [data-theme="cyan"]  { --accent:#00d4ff; --accent2:#7fffff; }
    [data-theme="mono"]  { --accent:#aaaaaa; --accent2:#cccccc; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);overflow-x:hidden;}
    .noise{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px;}
    .topbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(8,8,8,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:100;}
    .logo{font-family:var(--font-display);font-weight:800;font-size:1rem;letter-spacing:0.1em;color:var(--text-bright);}
    .logo .accent{color:var(--accent);}
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link{font-size:0.7rem;letter-spacing:0.15em;color:var(--text-dim);text-decoration:none;text-transform:lowercase;transition:color 0.2s;cursor:pointer;}
    .nav-link:hover,.nav-link.active{color:var(--text-bright);}
    .page{padding:80px 32px 40px;max-width:1400px;margin:0 auto;}
    .page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;animation:fadeUp 0.5s var(--transition) both;}
    .page-title{font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--text-bright);letter-spacing:0.05em;}
    .page-title span{color:var(--accent);}
    .game-count{font-size:0.62rem;letter-spacing:0.2em;color:var(--text-dim);}
    .search-wrap{position:relative;margin-bottom:20px;animation:fadeUp 0.5s 0.08s var(--transition) both;}
    .game-search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:11px 16px 11px 38px;color:var(--text-bright);font-family:var(--font-mono);font-size:0.78rem;outline:none;transition:border-color 0.2s;}
    .game-search:focus{border-color:var(--border-bright);}
    .game-search::placeholder{color:var(--text-dim);}
    .search-icon-inner{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;}
    .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;animation:fadeUp 0.5s 0.12s var(--transition) both;}
    .game-card{background:var(--bg2);border:1px solid var(--border);border-radius:5px;overflow:hidden;cursor:pointer;transition:transform 0.2s var(--transition),border-color 0.2s,box-shadow 0.2s;}
    .game-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,0.5),0 0 0 1px rgba(230,57,70,0.1);}
    .game-thumb{width:100%;aspect-ratio:16/10;background:var(--bg3);display:block;object-fit:cover;border-bottom:1px solid var(--border);}
    .game-thumb-fallback{width:100%;aspect-ratio:16/10;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
    .game-thumb-fallback::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(230,57,70,0.06) 0%,transparent 60%);}
    .game-info{padding:9px 11px;}
    .game-name{font-size:0.7rem;color:var(--text-bright);letter-spacing:0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .game-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;animation:overlayIn 0.2s var(--transition);}
    .game-overlay.hidden{display:none;}
    @keyframes overlayIn{from{opacity:0;transform:scale(0.98);}to{opacity:1;transform:scale(1);}}
    .game-overlay-bar{height:46px;background:rgba(8,8,8,0.96);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
    .overlay-title{font-family:var(--font-display);font-size:0.85rem;font-weight:700;color:var(--text-bright);flex:1;letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .overlay-btn{background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text-dim);font-family:var(--font-mono);font-size:0.68rem;padding:4px 10px;cursor:pointer;transition:all 0.15s;letter-spacing:0.05em;flex-shrink:0;}
    .overlay-btn:hover{border-color:var(--border-bright);color:var(--text-bright);}
    .overlay-btn.close-btn:hover{border-color:var(--accent);color:var(--accent);}
    .game-frame{flex:1;border:none;background:#000;}
    .no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-dim);font-size:0.75rem;letter-spacing:0.15em;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .hidden{display:none!important;}
  
.nav-dropdown { position: relative; }
.dropdown-toggle {
  font-size: 0.7rem; letter-spacing: 0.15em; color: var(--text-dim);
  background: none; border: none; cursor: pointer;
  font-family: var(--font-mono); padding: 0; transition: color 0.2s;
  text-transform: lowercase;
}
.dropdown-toggle:hover, .dropdown-toggle.active { color: var(--text-bright); }
.dropdown-menu {
  display: none; position: absolute; top: calc(100% + 10px); right: 0;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
  min-width: 140px; overflow: hidden; z-index: 300;
}
.dropdown-menu.open { display: block; animation: dropIn 0.15s var(--transition); }
.dropdown-item {
  display: block; padding: 9px 16px; font-size: 0.68rem;
  letter-spacing: 0.1em; color: var(--text-dim); text-decoration: none;
  text-transform: lowercase; transition: background 0.15s, color 0.15s;
}
.dropdown-item:hover, .dropdown-item.active { background: var(--bg3); color: var(--text-bright); }
@keyframes dropIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  
/* ── Page animations ─────────────────────────────────────── */
@keyframes fadeUp { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }
@keyframes fadeIn { from{opacity:0;}to{opacity:1;} }
.anim-1 { animation: fadeUp 0.5s 0.05s cubic-bezier(0.23,1,0.32,1) both; }

.anim-5 { animation: fadeUp 0.5s 0.33s cubic-bezier(0.23,1,0.32,1) both; }
.anim-fade { animation: fadeIn 0.5s 0.05s both; }

      ['TV Static',                  'tv-static',              'tv-static/static.png'],
      ['Vex 3',                      'vex3',                   'vex3/vex3.png'],
      ['Vex 4',                      'vex4',                   'vex4/vex4.png'],
      ['Vex 5',                      'vex5',                   'vex5/vex.jpeg'],
      ['Vex 6',                      'vex6',                   'vex6/assets/icon.jpeg'],
      ['Web Retro Local',            'webretro-local',         'webretro-local/assets/icon204.png'],
      ['Wolfenstein 3D',             'wolf3d',                 'wolf3d/art/wolf3d.png'],
      ['Wordle',                     'wordle',                 'wordle/img/logo_512x512.png'],
      ["World's Hardest Game",       'worlds-hardest-game',    'worlds-hardest-game/images/splash.jpg'],
      ["World's Hardest Game 2",     'worlds-hardest-game-2',  'worlds-hardest-game-2/the-worlds-hardest-game-2.jpg'],
      ['You Are Jeff Bezos',         'you-are-bezos',          'you-are-bezos/img/banner.png'],
      ['Zombs Royale',               'zombs-royale',           'zombs-royale/zomb.png'],
    ];

    const grid     = document.getElementById('gamesGrid');
    const searchEl = document.getElementById('gameSearch');
    const countEl  = document.getElementById('gameCount');
    const overlay  = document.getElementById('gameOverlay');
    const frame    = document.getElementById('gameFrame');
    const titleEl  = document.getElementById('overlayTitle');

    function render() {
      const q = searchEl.value.toLowerCase().trim();
      const filtered = q ? GAMES.filter(g => g[0].toLowerCase().includes(q)) : GAMES;
      countEl.textContent = filtered.length + ' games • 3kh0 assets';

      if (!filtered.length) { grid.innerHTML = '<div class="no-results">no games found</div>'; return; }

      grid.innerHTML = filtered.map(([name, folder, img, customUrl], i) => `
        <div class="game-card" data-url="${customUrl || (BASE+folder+'/index.html')}" data-name="${name}"
             style="animation:fadeUp 0.35s ${Math.min(i*0.015,0.4)}s var(--transition) both">
          <img class="game-thumb" src="${customUrl ? img : BASE+img}" alt="${name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="game-thumb-fallback" style="display:none">🎮</div>
          <div class="game-info"><div class="game-name">${name}</div></div>
        </div>
      `).join('');

      grid.querySelectorAll('.game-card').forEach(card => {
        card.addEventListener('click', () => {
          frame.src = card.dataset.url;
          titleEl.textContent = card.dataset.name;
          overlay.classList.remove('hidden');
          document.body.style.overflow = 'hidden';
        });
      });
    }

    document.getElementById('closeOverlay').addEventListener('click', () => {
      overlay.classList.add('hidden');
      frame.src = '';
      document.body.style.overflow = '';
    });

    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      (frame.requestFullscreen || frame.webkitRequestFullscreen).call(frame);
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !overlay.classList.contains('hidden')) {
        overlay.classList.add('hidden');
        frame.src = '';
        document.body.style.overflow = '';
      }
    });

    searchEl.addEventListener('input', render);
    render();
  

  </script>
  
  <script>
    const _mBtn = document.getElementById('moreBtn');
    const _mMenu = document.getElementById('dropdownMenu');
    if (_mBtn && _mMenu) {
      _mBtn.addEventListener('click', e => { e.stopPropagation(); _mMenu.classList.toggle('open'); });
      document.addEventListener('click', () => _mMenu.classList.remove('open'));
    }
  </script>

  <script>
  document.querySelectorAll('.page-header').forEach(el => el.classList.add('anim-1'));
  document.querySelectorAll('.search-wrap').forEach(el => el.classList.add('anim-2'));
  document.querySelectorAll('.games-grid').forEach(el => el.classList.add('anim-3'));
  </script>
</body>
</html>
