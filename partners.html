<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>vantablack — partners</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@300;400;700;800&display=swap');
    :root {
      --bg:#080808; --bg2:#0f0f0f; --bg3:#161616;
      --border:#222; --border-bright:#333;
      --text:#c8c8c8; --text-dim:#555; --text-bright:#e8e8e8;
      --accent:#e63946; --accent2:#ff6b6b;
      --font-display:'Syne',sans-serif; --font-mono:'Space Mono',monospace;
      --transition:cubic-bezier(0.23,1,0.32,1);
    }
    [data-theme="cyan"] { --accent:#00d4ff; --accent2:#7fffff; }
    [data-theme="mono"] { --accent:#aaaaaa; --accent2:#cccccc; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { min-height:100%; background:var(--bg); color:var(--text); font-family:var(--font-mono); }
    .noise {
      position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:0.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px;
    }
    .topbar {
      position:fixed; top:0; left:0; right:0; height:52px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 32px; background:rgba(8,8,8,0.9); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border); z-index:100;
    }
    .logo { font-family:var(--font-display); font-weight:800; font-size:1rem; letter-spacing:0.1em; color:var(--text-bright); text-decoration:none; }
    .logo .accent { color:var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link { font-size:0.7rem; letter-spacing:0.15em; color:var(--text-dim); text-decoration:none; text-transform:lowercase; transition:color 0.2s; }
    .nav-link:hover, .nav-link.active { color:var(--text-bright); }
    .page { padding:90px 32px 60px; max-width:1100px; margin:0 auto; }
    .page-header { margin-bottom:48px; animation:fadeUp 0.5s var(--transition) both; }
    .page-title { font-family:var(--font-display); font-size:2.2rem; font-weight:700; color:var(--text-bright); letter-spacing:0.05em; margin-bottom:10px; }
    .page-title span { color:var(--accent); }
    .page-sub { font-size:0.65rem; letter-spacing:0.25em; color:var(--text-dim); text-transform:uppercase; }
    .empty-state {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:80px 20px; gap:14px; text-align:center;
      border:1px dashed var(--border); border-radius:6px;
      animation:fadeUp 0.5s 0.1s var(--transition) both;
    }
    .empty-icon { font-size:1.5rem; color:var(--accent); opacity:0.4; }
    .empty-text { font-family:var(--font-display); font-size:1.4rem; font-weight:700; color:var(--text-bright); letter-spacing:0.05em; }
    .empty-sub { font-size:0.65rem; letter-spacing:0.2em; color:var(--text-dim); text-transform:uppercase; }

    .partner-btn {
      margin-top:8px; display:inline-block;
      background:var(--bg3); border:1px solid var(--border); border-radius:4px;
      color:var(--text-dim); font-family:var(--font-mono); font-size:0.7rem;
      letter-spacing:0.1em; padding:9px 20px; text-decoration:none;
      transition:all 0.2s;
    }
    .partner-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(230,57,70,0.06); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
    ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  
.nav-dropdown { position: relative; }
.dropdown-toggle {
  font-size: 0.7rem; letter-spacing: 0.15em; color: var(--text-dim);
  background: none; border: none; cursor: pointer;
  font-family: var(--font-mono); padding: 0; transition: color 0.2s;
  text-transform: lowercase;
}
.dropdown-toggle:hover, .dropdown-toggle.active { color: var(--text-bright); }
.dropdown-menu {
  display: none; position: absolute; top: calc(100% + 10px); right: 0;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
  min-width: 140px; overflow: hidden; z-index: 300;
}
.dropdown-menu.open { display: block; animation: dropIn 0.15s var(--transition); }
.dropdown-item {
  display: block; padding: 9px 16px; font-size: 0.68rem;
  letter-spacing: 0.1em; color: var(--text-dim); text-decoration: none;
  text-transform: lowercase; transition: background 0.15s, color 0.15s;
}
.dropdown-item:hover, .dropdown-item.active { background: var(--bg3); color: var(--text-bright); }
@keyframes dropIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  
/* ── Page animations ─────────────────────────────────────── */
@keyframes fadeUp { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }
@keyframes fadeIn { from{opacity:0;}to{opacity:1;} }
.anim-1 { animation: fadeUp 0.5s 0.05s cubic-bezier(0.23,1,0.32,1) both; }
.anim-2 { animation: fadeUp 0.5s 0.12s cubic-bezier(0.23,1,0.32,1) both; }
.anim-3 { animation: fadeUp 0.5s 0.19s cubic-bezier(0.23,1,0.32,1) both; }
.anim-4 { animation: fadeUp 0.5s 0.26s cubic-bezier(0.23,1,0.32,1) both; }
.anim-5 { animation: fadeUp 0.5s 0.33s cubic-bezier(0.23,1,0.32,1) both; }
.anim-fade { animation: fadeIn 0.5s 0.05s both; }

  
/* ── Custom cursor ───────────────────────────────────────── */
*, *::before, *::after { cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"><path fill="%23F85050" stroke="%23000000" stroke-width="2" d="M5.5 3.21V20.8c0 .45.54.67.85.35l4.86-4.86a.5.5 0 0 1 .35-.15h6.87a.5.5 0 0 0 .35-.85L6.35 2.85a.5.5 0 0 0-.85.35Z"></path></svg>') 0 0, auto !important; }

  </style>
</head>
<body>
  <div class="noise"></div>
  <nav class="topbar">
    <a href="index.html" class="logo">vanta<span class="accent">black</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">home</a>
      <a href="games.html" class="nav-link">games</a>
      <a href="music.html" class="nav-link">music</a>
      <a href="proxy.html" class="nav-link">proxy</a>
      <a href="ai.html" class="nav-link">AI</a>
      <a href="index.html" class="nav-link">settings</a>
      <div class="nav-dropdown">
        <button class="dropdown-toggle active" id="moreBtn">more ▾</button>
        <div class="dropdown-menu" id="dropdownMenu">
        <a href="about.html" class="dropdown-item">about</a>
        <a href="changelog.html" class="dropdown-item">changelog</a>
        <a href="themes.html" class="dropdown-item">themes</a>
        <a href="bookmarks.html" class="dropdown-item">bookmarks</a>
        <a href="partners.html" class="dropdown-item active">partners</a>
        </div>
      </div>
    </div>
  </nav>
  <div class="page">
    <div class="page-header">
      <div class="page-title">part<span>ners</span></div>
      <div class="page-sub">the projects that make vantablack possible</div>
    </div>
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-text">No partners yet!</div>
      <div class="empty-sub">Check back soon.</div>
      <a href="https://discord.com/users/1258234423191670795" target="_blank" class="partner-btn">Want to partner? →</a>
    </div>
  </div>
  <script>
    try {
      const s = JSON.parse(localStorage.getItem('vanta_settings') || '{}');
      if (s.theme) document.documentElement.setAttribute('data-theme', s.theme);
    } catch {}
  

  </script>
  
  <script>
    const _mBtn = document.getElementById('moreBtn');
    const _mMenu = document.getElementById('dropdownMenu');
    if (_mBtn && _mMenu) {
      _mBtn.addEventListener('click', e => { e.stopPropagation(); _mMenu.classList.toggle('open'); });
      document.addEventListener('click', () => _mMenu.classList.remove('open'));
    }
  </script>

  <script>
  document.querySelectorAll('.page-header').forEach(el => el.classList.add('anim-1'));
  document.querySelectorAll('.empty-state').forEach(el => el.classList.add('anim-2'));
  </script>
</body>
</html>
